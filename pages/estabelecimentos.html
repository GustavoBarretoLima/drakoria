<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Drakoria - Estabelecimentos</title>
    <link rel="stylesheet" href="../css/estabelecimentos.css" />
    <script src="../js/estabelecimentos.js"></script>
  </head>
  <body>
    <!-- Praça principal -->
    <div id="praca" class="drakoria-praca fade">
      <div
        class="hotspot taberna"
        onclick="carregarTaberna()"
        data-tooltip="🍺 Entrar na Taberna"
      >
        <span class="icon">🍺</span>
      </div>

      <div
        class="hotspot ferreiro"
        onclick="carregarFerreiro()"
        data-tooltip="⚒️ Ir ao Ferreiro"
      >
        <span class="icon">⚒️</span>
      </div>

      <div
        class="hotspot guilda"
        onclick="carregarGuilda()"
        data-tooltip="🛡️ Guilda dos Aventureiros"
      >
        <span class="icon">🛡️</span>
      </div>
    </div>

    <!-- Interiores -->
    <div id="taberna" style="display: none"></div>
    <div id="ferreiro" style="display: none"></div>
    <div id="guilda" style="display: none"></div>
  </body>
</html>
