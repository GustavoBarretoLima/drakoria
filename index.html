<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reino de Drakoria</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- Partículas mágicas -->
    <div class="particle fire" style="left: 10%; animation-delay: 0s"></div>
    <div class="particle ice" style="left: 30%; animation-delay: 2s"></div>
    <div class="particle light" style="left: 50%; animation-delay: 4s"></div>
    <div class="particle shadow" style="left: 70%; animation-delay: 1s"></div>
    <div class="particle storm" style="left: 90%; animation-delay: 3s"></div>

    <!-- Lore inicial -->
    <section id="lore">
      <h1>Bem-vindo ao Reino de Drakoria</h1>
      <p>
        Sob o olhar dos dragões ancestrais, Drakoria ergue-se entre montanhas e
        rios flamejantes. Seu castelo guarda segredos de poder e magia antiga, e
        apenas os heróis escolhidos poderão decidir o destino deste reino
        lendário.
      </p>
      <button id="btnEntrar">Entrar no Jogo</button>
    </section>

    <!-- Script principal -->
    <script type="module" src="./js/script.js"></script>
  </body>
</html>
